name: GitHub Actions for distribution

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
        type: string

permissions:
  contents: write

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Packaging
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: npx @vscode/vsce package

      - name: Create a new tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git fetch --tags --force
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "$VERSION" *.vsix --title "Release v$VERSION" --generate-notes